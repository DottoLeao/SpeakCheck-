<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- SpeakCheck logo — waveform bars resolving into a check -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4460C1"/>
      <stop offset="1" stop-color="#2C3F82"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- audio bars -->
  <rect x="118" y="206" width="40" height="100" rx="20" fill="#FFFFFF" opacity=".92"/>
  <rect x="190" y="168" width="40" height="176" rx="20" fill="#FFFFFF"/>
  <rect x="262" y="192" width="40" height="128" rx="20" fill="#FFFFFF" opacity=".96"/>
  <!-- the check -->
  <path d="M330 268 L360 300 L414 208" fill="none" stroke="#66BC29" stroke-width="42"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
